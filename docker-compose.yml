services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: compliancescope
      POSTGRES_PASSWORD: compliancescope
      POSTGRES_DB: compliancescope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliancescope"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://compliancescope:compliancescope@db:5432/compliancescope
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EDGAR_USER_AGENT: "ComplianceScope Ryan Denny ryandennyjohn@gmail.com"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  pgdata: